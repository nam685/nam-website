<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FF1744" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none"
        stroke="#FF1744" stroke-width="0.7" opacity="0.3"/>

  <!-- Corner tech brackets -->
  <line x1="3" y1="1.5" x2="7" y2="1.5" stroke="#FF1744" stroke-width="0.8" opacity="0.55"/>
  <line x1="1.5" y1="3" x2="1.5" y2="7" stroke="#FF1744" stroke-width="0.8" opacity="0.55"/>
  <line x1="25" y1="30.5" x2="29" y2="30.5" stroke="#FF1744" stroke-width="0.8" opacity="0.55"/>
  <line x1="30.5" y1="25" x2="30.5" y2="29" stroke="#FF1744" stroke-width="0.8" opacity="0.55"/>

  <!-- N — proper diagonal: top-left ↘ bottom-right -->
  <g filter="url(#glow)">
    <polygon points="8.5,26 7,25 7,7.5 8.5,6 10.5,6 21.5,20 21.5,6 24,6 25,7.5 25,25 23.5,26 21.5,26 10.5,12 10.5,26"
             fill="#FF1744"/>
  </g>

  <!-- Highlight for depth -->
  <polygon points="9.5,25 8,8.5 9.5,7 22,19 22,7 24,7 24,24 22.5,25 22.5,25 9.5,13 9.5,25"
           fill="#FF5577" opacity="0.25"/>

  <!-- Scanlines -->
  <line x1="6" y1="13" x2="26" y2="13" stroke="#0a0a0a" stroke-width="0.4" opacity="0.45"/>
  <line x1="6" y1="19" x2="26" y2="19" stroke="#0a0a0a" stroke-width="0.4" opacity="0.45"/>

  <!-- Circuit dots -->
  <circle cx="5" cy="16" r="0.6" fill="#FF1744" opacity="0.45"/>
  <circle cx="27" cy="16" r="0.6" fill="#FF1744" opacity="0.45"/>
</svg>
