<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Mask: N shape is the cutout -->
    <mask id="n-cutout">
      <rect width="32" height="32" fill="white"/>
      <polygon points="8.5,26 7,25 7,7.5 8.5,6 10.5,6 21.5,20 21.5,6 24,6 25,7.5 25,25 23.5,26 21.5,26 10.5,12 10.5,26"
               fill="black"/>
    </mask>
  </defs>

  <!-- Red circle with N cut out (transparent N shape) -->
  <circle cx="16" cy="16" r="15" fill="#ffffff" filter="url(#glow)" mask="url(#n-cutout)"/>

  <!-- Subtle inner ring for depth -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3" mask="url(#n-cutout)"/>

  <!-- Corner tech brackets -->
  <line x1="3" y1="1.5" x2="7" y2="1.5" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
  <line x1="1.5" y1="3" x2="1.5" y2="7" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
  <line x1="25" y1="30.5" x2="29" y2="30.5" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
  <line x1="30.5" y1="25" x2="30.5" y2="29" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>

  <!-- Scanlines over the circle -->
  <line x1="4" y1="13" x2="28" y2="13" stroke="#0a0a0a" stroke-width="0.3" opacity="0.25" mask="url(#n-cutout)"/>
  <line x1="4" y1="19" x2="28" y2="19" stroke="#0a0a0a" stroke-width="0.3" opacity="0.25" mask="url(#n-cutout)"/>
</svg>
