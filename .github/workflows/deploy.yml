name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: nam
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export PATH="$HOME/.local/bin:$HOME/.local/share/pnpm:$PATH"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            if [ ! -d ~/nam-website-deploy ]; then
              git clone https://github.com/nam685/nam-website.git ~/nam-website-deploy
            fi
            cd ~/nam-website-deploy
            git fetch origin main
            git reset --hard origin/main

            # Backend
            uv sync
            uv run python manage.py collectstatic --noinput
            uv run python manage.py migrate --noinput
            sudo systemctl restart django
            sudo systemctl restart celery

            # Frontend
            cd frontend
            pnpm install --frozen-lockfile
            pnpm exec next build
            sudo systemctl restart nextjs

            # Sync systemd service files + Caddy config
            cd ~/nam-website-deploy
            RELOAD_SYSTEMD=false
            for svc in django nextjs celery; do
              if ! diff -q infra/$svc.service /etc/systemd/system/$svc.service > /dev/null 2>&1; then
                sudo cp infra/$svc.service /etc/systemd/system/$svc.service
                RELOAD_SYSTEMD=true
              fi
            done
            if [ "$RELOAD_SYSTEMD" = true ]; then
              sudo systemctl daemon-reload
            fi

            if ! diff -q infra/Caddyfile /etc/caddy/Caddyfile > /dev/null 2>&1; then
              sudo cp infra/Caddyfile /etc/caddy/Caddyfile
              sudo systemctl reload caddy
            fi
