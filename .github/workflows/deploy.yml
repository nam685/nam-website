name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    steps:
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: nam
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: frontend-build/*
          target: /tmp/next-build
          strip_components: 1
          overwrite: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: nam
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export PATH="$HOME/.local/bin:$HOME/.local/share/pnpm:$PATH"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            if [ ! -d ~/nam-website-deploy ]; then
              git clone https://github.com/nam685/nam-website.git ~/nam-website-deploy
            fi
            cd ~/nam-website-deploy
            git fetch origin main
            git reset --hard origin/main

            # Backend
            uv sync
            uv run python manage.py migrate --noinput
            sudo systemctl restart django

            # Frontend
            cd frontend
            pnpm install --frozen-lockfile
            rm -rf .next
            mv /tmp/next-build .next
            sudo systemctl restart nextjs
