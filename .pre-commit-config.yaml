repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && pnpm exec eslint'
        language: system
        files: ^frontend/.*\.[jt]sx?$
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && pnpm exec prettier --check .'
        language: system
        files: ^frontend/
        pass_filenames: false
